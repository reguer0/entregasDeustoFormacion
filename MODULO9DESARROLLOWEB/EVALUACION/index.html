<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Formulario de Vehículo</title>
	<link rel="stylesheet" href="css/styles.css">
</head>
<body>
	<div class="page-wrapper">
		<div class="form-container">
			<h1 class="form-title">Datos del Vehículo</h1>
			<div class="form-group">
				<label for="marca">Marca</label>
				<input type="text" id="marca" name="marca" placeholder="Ej: Toyota">
			</div>
			<div class="form-group">
				<label for="modelo">Modelo</label>
				<input type="text" id="modelo" name="modelo" placeholder="Ej: Corolla">
			</div>
			<div class="form-row">
				<div class="form-group">
					<label for="anio">Año</label>
					<input type="number" id="anio" name="anio" placeholder="Ej: 2021" min="1900" max="2100">
				</div>
				<div class="form-group">
					<label for="km">Kilómetros</label>
					<input type="number" id="km" name="km" placeholder="Ej: 45000" min="0">
				</div>
			</div>
			<div class="form-group">
				<label for="combustible">Combustible</label>
				<select id="combustible" name="combustible">
					<option value="">-- Selecciona --</option>
					<option value="gasolina">Gasolina</option>
					<option value="diesel">Diésel</option>
					<option value="electrico">Eléctrico</option>
					<option value="hibrido">Híbrido</option>
				</select>
			</div>
			<div class="form-group">
				<label for="precio">Precio (€)</label>
				<input type="number" id="precio" name="precio" placeholder="Ej: 18500" min="0">
			</div>
			<button class="btn-submit" id="btn-enviar">Enviar</button>
		</div>
	</div>
	<script src="js/main.js"></script>
</body>
</html>
